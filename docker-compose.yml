# [DEPLOY-REMARK] นี่คือ compose ของ "edge" (reverse proxy ด่านหน้าสุด)
# ก่อน start บน server จริง ต้องสร้าง network กลางก่อน (ทำครั้งเดียว):
#   docker network create dormi_network
# network นี้ต้องชื่อเดียวกับฝั่ง backend/frontend เพื่อให้ edge คุยกับ LB ข้างในได้
#
# โครงนี้ทำ cert อัตโนมัติทั้งวงจร (dummy → certbot → renew → auto-reload)
# อ้างอิง pattern จาก nst-nginx-front
services:
  edge:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dormi-edge
    restart: always
    ports:
      # [DEPLOY-REMARK] server ต้องเปิด firewall/security group port 80 และ 443
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/projects:/etc/nginx/projects:ro
      - ./nginx/snippets:/etc/nginx/snippets:ro
      # cert (แชร์กับ certbot) — ต้อง rw เพื่อให้ 10-init-dummy-cert.sh เขียน dummy ได้ตอน boot แรก
      - ./data/certbot/conf:/etc/letsencrypt
      - ./data/certbot/www:/var/www/certbot
    networks:
      - dormi_network

  # ── Certbot ── ศูนย์กลาง cert สำหรับทุกโดเมนของ dormi ──
  certbot:
    image: certbot/certbot
    container_name: dormi-certbot
    environment:
      # [DEPLOY-REMARK] เปลี่ยนเป็นอีเมลจริง (Let's Encrypt ใช้เตือนก่อน cert หมดอายุ)
      - CERTBOT_EMAIL=${CERTBOT_EMAIL:-admin@dormi-linkandrent.com}
    volumes:
      - ./data/certbot/conf:/etc/letsencrypt
      - ./data/certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $${!}; done'"
    depends_on:
      - edge
    networks:
      - dormi_network
    restart: always

networks:
  dormi_network:
    # [DEPLOY-REMARK] external: true = ต้องสร้าง network นี้เองก่อน (ดูคำสั่งด้านบน)
    external: true
