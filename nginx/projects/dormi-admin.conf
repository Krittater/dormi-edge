# ============================================================================
# [DEPLOY-REMARK] ไฟล์นี้คือ "หน้าด่าน" (reverse proxy) ที่รับ traffic จากภายนอก
# สิ่งที่ต้องแก้ก่อนขึ้น server จริง:
#   1) server_name  -> เปลี่ยนเป็นโดเมนจริงที่ DNS ชี้มาที่ IP ของ server
#   2) เปิด HTTPS (443) + ใบรับรอง TLS  -> ดู block ตัวอย่างด้านล่าง (ตอนนี้ comment ไว้)
#   3) บังคับ redirect 80 -> 443 หลังมีใบรับรองแล้ว
# หมายเหตุ: ตอนนี้รับเฉพาะ HTTP (port 80) แต่ส่ง header HSTS ออกไป
#           ซึ่ง browser จะพยายามต่อ https -> ต้องเปิด 443 ให้เสร็จก่อนใช้งานจริง
# ============================================================================

server {

    listen 80;

    # [DEPLOY-REMARK] เปลี่ยนเป็นโดเมนจริง เช่น: admin.dormi-linkandrent.com
    server_name admin.dormi-linkandrent.com;

    # [DEPLOY-REMARK] ขั้น production: เปิดบรรทัดนี้เพื่อบังคับไปใช้ HTTPS
    # return 301 https://$host$request_uri;

    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;

    location / {
        # [DEPLOY-REMARK] dormi-admin-lb ต้องอยู่บน network เดียวกับ edge (dormi_network)
        proxy_pass http://dormi-admin-lb:80;
        include /etc/nginx/conf.d/proxy.conf;
    }
}

