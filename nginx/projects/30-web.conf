# ============================================================
# Web frontend (Next.js Node server)  →  dormi-linkandrent.com
# ------------------------------------------------------------
# ลอกโครงจาก _web-frontend.conf.example (template) — ไฟล์นี้คือตัวใช้จริง
# server_name = apex อย่างเดียว (www ยังชี้ Render → ใส่แล้ว cert จะ fail ทั้งใบ)
# scale: docker compose up -d --scale dormi-web=N (ไม่ต้องแก้ไฟล์นี้)
# ============================================================

upstream dormi_web_pool {
    zone dormi_web_pool 64k;
    least_conn;
    server dormi-web:3000 resolve;     # service:port ของ frontend Node server
    keepalive 32;
}

# ── :80 — ACME challenge + บังคับไป HTTPS ──
server {
    listen 80;
    server_name dormi-linkandrent.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── :443 — Web frontend ──
server {
    listen 443 ssl;
    http2 on;
    server_name dormi-linkandrent.com;

    ssl_certificate     /etc/letsencrypt/live/edge-dormi/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/edge-dormi/privkey.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;

    location /whoami { return 200 "dormi-web\n"; }

    location / {
        include /etc/nginx/snippets/proxy_common.conf;
        proxy_pass http://dormi_web_pool;
    }
}
