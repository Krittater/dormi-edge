# ============================================================
# Admin API  →  admin-api.dormi-linkandrent.com  |  edge = LB ในตัว
# ------------------------------------------------------------
# scale: docker compose up -d --scale dormi-admin=N (ไม่ต้องแก้ไฟล์นี้)
# ------------------------------------------------------------
# [DEPLOY-REMARK] ต้องมีก่อนใช้งานจริง:
#   1) DNS: admin-api.dormi-linkandrent.com → IP ของ edge
#   2) service "dormi-admin" ต้องอยู่บน dormi_network (expose 3000)
#      ⚠️ ตอนนี้ backend ยังไม่มี service นี้ → hit แล้วจะ 502 จนกว่าจะสร้าง
# ============================================================

upstream dormi_admin_pool {
    zone dormi_admin_pool 64k;
    least_conn;
    server dormi-admin:3000 resolve;   # [DEPLOY-REMARK] service:port ภายในของ admin backend
    keepalive 32;
}

# ── :80 — ACME challenge + บังคับไป HTTPS ──
server {
    listen 80;
    server_name admin-api.dormi-linkandrent.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── :443 — Admin API ──
server {
    listen 443 ssl;
    http2 on;
    server_name admin-api.dormi-linkandrent.com;

    ssl_certificate     /etc/letsencrypt/live/edge-dormi/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/edge-dormi/privkey.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;

    location /whoami { return 200 "admin-api\n"; }

    location / {
        include /etc/nginx/snippets/proxy_common.conf;
        proxy_pass http://dormi_admin_pool;
    }
}
