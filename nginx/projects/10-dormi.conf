# ============================================================
# Dormi main app — web (frontend) + api  |  edge = LB ในตัว
# ------------------------------------------------------------
# วิธี scale: docker compose up -d --scale dormi-api=4  (ไม่ต้องแก้ไฟล์นี้)
#   → "server ... resolve" จะดึง IP ของทุก replica จาก docker DNS อัตโนมัติ
#     แล้วกระจาย load แบบ least_conn ให้เอง
# ------------------------------------------------------------
# [DEPLOY-REMARK] ก่อนขึ้น server จริง:
#   1) server_name = โดเมนจริงที่ DNS ชี้มาที่ IP ของ edge
#   2) ชื่อ service ใน upstream (dormi-api / dormi-web) = ชื่อ service บน dormi_network
#   3) ออก cert ด้วย scripts/issue-cert.sh (รวมโดเมนของทุก project ให้อัตโนมัติ)
# ============================================================

# ── LB pool: API replicas ──
upstream dormi_api_pool {
    zone dormi_api_pool 64k;          # ต้องมี zone เพื่อให้ resolve แบบ dynamic ได้
    least_conn;
    server dormi-api:3000 resolve;    # [DEPLOY-REMARK] service:port ภายในของ backend
    keepalive 32;
}

# ── LB pool: Web (frontend) replicas ──
upstream dormi_web_pool {
    zone dormi_web_pool 64k;
    least_conn;
    server dormi-web:3000 resolve;     # [DEPLOY-REMARK] service:port ภายในของ frontend
    keepalive 32;
}

# ── :80 — ACME challenge + บังคับไป HTTPS (block เดียว) ──
server {

    listen 80;
    server_name dormi-linkandrent.com www.dormi-linkandrent.com api.dormi-linkandrent.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── :443 — เว็บหน้าบ้าน ──
server {

    listen 443 ssl;
    http2 on;
    server_name dormi-linkandrent.com www.dormi-linkandrent.com;

    ssl_certificate     /etc/letsencrypt/live/edge-dormi/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/edge-dormi/privkey.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;

    location /whoami { return 200 "dormi-web\n"; }

    location / {
        include /etc/nginx/snippets/proxy_common.conf;
        proxy_pass http://dormi_web_pool;
    }

}

# ── :443 — API ──
server {

    listen 443 ssl;
    http2 on;
    server_name api.dormi-linkandrent.com;

    ssl_certificate     /etc/letsencrypt/live/edge-dormi/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/edge-dormi/privkey.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;

    location /whoami { return 200 "dormi-api\n"; }

    location / {
        include /etc/nginx/snippets/proxy_common.conf;
        proxy_pass http://dormi_api_pool;
    }
}
