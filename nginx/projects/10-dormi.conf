# ============================================================
# Dormi API  →  dormi-api.dormi-linkandrent.com  |  edge = LB ในตัว
# ------------------------------------------------------------
# scale: docker compose up -d --scale dormi-api=N  (ไม่ต้องแก้ไฟล์นี้)
#   → "server ... resolve" ดึง IP ของทุก replica จาก docker DNS อัตโนมัติ
#     แล้วกระจาย load แบบ least_conn ให้เอง
# ------------------------------------------------------------
# [DEPLOY-REMARK] ก่อนขึ้น server จริง:
#   1) DNS: dormi-api.dormi-linkandrent.com → IP ของ edge
#   2) service dormi-api ต้องอยู่บน dormi_network (expose 3000)
#   3) ออก cert: scripts/issue-cert.sh (รวมโดเมนของทุก project อัตโนมัติ)
# ============================================================

upstream dormi_api_pool {
    zone dormi_api_pool 64k;          # ต้องมี zone เพื่อให้ resolve แบบ dynamic ได้
    least_conn;
    server dormi-api:3000 resolve;    # [DEPLOY-REMARK] service:port ภายในของ backend
    keepalive 32;
}

# ── :80 — ACME challenge + บังคับไป HTTPS ──
server {
    listen 80;
    server_name dormi-api.dormi-linkandrent.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── :443 — Dormi API ──
server {
    listen 443 ssl;
    http2 on;
    server_name dormi-api.dormi-linkandrent.com;

    ssl_certificate     /etc/letsencrypt/live/edge-dormi/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/edge-dormi/privkey.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;

    location /whoami { return 200 "dormi-api\n"; }

    location / {
        include /etc/nginx/snippets/proxy_common.conf;
        proxy_pass http://dormi_api_pool;
    }
}
