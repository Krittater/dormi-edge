user nginx;
worker_processes auto;

events {
    worker_connections 4096;
    multi_accept on;
}

http {
    default_type application/octet-stream;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    server_tokens off;

    client_body_timeout 60s;
    client_header_timeout 60s;
    client_max_body_size 50m;

    # ── JSON access log (มี request_id + upstream timing → ต่อ log system ได้เลย) ──
    log_format edge_json escape=json '{'
    '"time":"$time_iso8601",'
    '"remote_addr":"$remote_addr",'
    '"x_forwarded_for":"$http_x_forwarded_for",'
    '"request_id":"$request_id",'
    '"host":"$host",'
    '"method":"$request_method",'
    '"uri":"$request_uri",'
    '"status":$status,'
    '"bytes_sent":$bytes_sent,'
    '"request_time":$request_time,'
    '"upstream_addr":"$upstream_addr",'
    '"upstream_status":"$upstream_status",'
    '"upstream_response_time":"$upstream_response_time",'
    '"referer":"$http_referer",'
    '"user_agent":"$http_user_agent"'
    '}';

    access_log /dev/stdout edge_json;
    error_log /dev/stderr warn;

    # ── docker internal DNS: ให้ nginx resolve ชื่อ service ตอน runtime ──
    # (คู่กับ set $var + proxy_pass $var → nginx start ได้แม้ upstream ยังไม่ขึ้น)
    # valid=10s → nginx re-resolve ชื่อ upstream ทุก 10 วิ
    # (รองรับ scale: replica ใหม่ถูกกระจาย load ภายใน ~10 วิ โดยไม่ต้อง reload)
    resolver 127.0.0.11 ipv6=off valid=10s;
    resolver_timeout 5s;

    # ── TLS (ใช้ร่วมทุก vhost) ──
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ── gzip ──
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript application/xml image/svg+xml;

    # ── default guards: ตัด traffic host มั่ว / IP scan ──
    server {
        listen 80 default_server;
        server_name _;
        return 444;                 # ปิด connection ทิ้งเงียบๆ
    }

    server {
        listen 443 ssl default_server;
        server_name _;
        ssl_reject_handshake on;    # ปฏิเสธ TLS handshake ที่ไม่ตรงโดเมน
    }

    include /etc/nginx/projects/*.conf;
}
