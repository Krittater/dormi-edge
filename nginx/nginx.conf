user nginx;

worker_processes auto;

events {
    worker_connections 4096;
    multi_accept on;
}

http {
    default_type  application/octet-stream;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    server_tokens off;

    resolver 127.0.0.11 valid=30s ipv6=off;

    include /etc/nginx/projects/*.conf;
}
