# Full-Update (manual) — deploy ทั้ง stack แบบเห็น step ละเอียด + revert เป็น job แยก
# ─────────────────────────────────────────────────────────────────────────
# trigger: GitHub UI (Actions → Run workflow → เลือก scope จาก dropdown)
#   หรือ local:  gh workflow run full-update.yml -f scope=frontend
#                gh run watch
#
# ★ scope — deploy ฝั่งเดียวได้ (เบา แต่ยังได้ snapshot + version + rollback):
#   all      = migration → backend → frontend   (ค่าเริ่มต้น — ปล่อยพร้อมกัน)
#   backend  = migration → backend               (ข้าม frontend)
#   frontend = frontend                          (ข้าม migration + backend — เร็วสุด)
#   → กันการรื้อ backend rebuild ทิ้งเปล่าตอนแก้แค่ FE
#
# ★ การส่งค่า snapshot → revert: ไม่ได้ส่งผ่าน GitHub เลย!
#   ทุก job SSH เข้า "server เดียวกัน" → ค่าอยู่บนไฟล์ server:
#     /root/dormi-releases/snapshots/latest/snapshot.env  (image :prev, commit)
#     /root/dormi-releases/snapshots/latest/MIGRATION_RAN (marker + path backup)
#   revert scripts อ่านไฟล์พวกนี้เอง → ไม่ต้องใช้ job outputs / artifact
#
# GitHub Secrets (edge repo → Settings → Secrets → Actions):
#   PROD_SERVER, SERVER_USER, SSH_KEY

name: Full Update (manual)

on:
  workflow_dispatch:
    inputs:
      scope:
        description: 'จะ deploy ส่วนไหน'
        type: choice
        options:
          - all
          - frontend
          - backend
        default: all
      version:
        description: 'ระบุ release version (X.Y.Z) — เว้นว่าง = auto +0.0.1 (patch)'
        required: false
        default: ''

concurrency:
  group: full-update
  cancel-in-progress: false

jobs:
  # ═══════ DEPLOY PATH (ต่อกันด้วย needs — job ก่อนผ่านถึงรันต่อ) ═══════
  prep:
    name: "0 · pull edge scripts"
    runs-on: ubuntu-latest
    steps:
      - uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PROD_SERVER }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_KEY }}
          script_stop: true
          script: cd /root/dormi-edge && git pull

  check:
    name: "1 · check lockfile (FE+BE)"
    needs: prep
    runs-on: ubuntu-latest
    steps:
      - uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PROD_SERVER }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_KEY }}
          script_stop: true
          script: cd /root/dormi-edge/deploy/dormi-full-update && bash 00-check/check0-lockfile-match.sh

  snapshot:
    name: "2 · snapshot (tag image :prev)"
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PROD_SERVER }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_KEY }}
          script_stop: true
          script: cd /root/dormi-edge/deploy/dormi-full-update && bash 01-prepare/snapshot.sh

  migration:
    name: "3 · migration (diff→backup→run)"
    needs: snapshot
    # ข้ามเมื่อ scope=frontend (FE ไม่แตะ schema) · needs: snapshot = snapshot พังก็ข้าม
    if: ${{ inputs.scope != 'frontend' }}
    runs-on: ubuntu-latest
    steps:
      - uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PROD_SERVER }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_KEY }}
          script_stop: true
          script: cd /root/dormi-edge/deploy/dormi-full-update && bash 02-deploy/step1-migration-run.sh

  backend:
    name: "4 · deploy backend"
    needs: migration
    # needs: migration (default success) → migration พัง/ข้าม = backend ข้ามด้วย
    # + gate scope: frontend-only ไม่ deploy backend
    if: ${{ inputs.scope != 'frontend' }}
    runs-on: ubuntu-latest
    steps:
      - uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PROD_SERVER }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_KEY }}
          script_stop: true
          script: cd /root/dormi-edge/deploy/dormi-full-update && bash 02-deploy/step2-backend-deploy.sh

  frontend:
    name: "5 · deploy frontend"
    needs: [snapshot, migration, backend]
    # รันเมื่อ: scope ไม่ใช่ backend + snapshot ผ่าน + ทั้ง migration และ backend "ไม่ fail"
    #   backend skipped ได้ 2 กรณี: (ก) scope=frontend (ตั้งใจ) → deploy FE ต่อ
    #                               (ข) migration fail → backend ถูก success-gate ข้าม → ต้อง "ไม่" deploy FE
    #   ดัก (ข) ด้วย migration.result != failure
    if: >-
      ${{ always()
        && inputs.scope != 'backend'
        && needs.snapshot.result == 'success'
        && needs.migration.result != 'failure'
        && needs.backend.result != 'failure' }}
    runs-on: ubuntu-latest
    steps:
      - uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PROD_SERVER }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_KEY }}
          script_stop: true
          script: cd /root/dormi-edge/deploy/dormi-full-update && bash 02-deploy/step3-frontend-deploy.sh

  # บันทึก release version — รันเมื่อ deploy สำเร็จตาม scope (ไม่มีฝั่งไหน fail)
  #   all      → backend + frontend success
  #   backend  → backend success (frontend skipped)
  #   frontend → frontend success (backend skipped)
  # ★ ไม่ revert: งานบันทึกอย่างเดียว, push log พังก็ไม่กระทบ deploy
  version:
    name: "6 · record release version"
    needs: [backend, frontend]
    if: >-
      ${{ always()
        && needs.backend.result != 'failure'
        && needs.frontend.result != 'failure'
        && (needs.backend.result == 'success' || needs.frontend.result == 'success') }}
    runs-on: ubuntu-latest
    steps:
      - uses: appleboy/ssh-action@v1.2.0
        env:
          VERSION_INPUT: ${{ inputs.version }}
        with:
          host: ${{ secrets.PROD_SERVER }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_KEY }}
          envs: VERSION_INPUT
          script_stop: true
          # VERSION_INPUT ว่าง = auto +0.0.1 ; มีค่า = override
          script: cd /root/dormi-edge/deploy/dormi-full-update && bash 02-deploy/step4-version-manager.sh "$VERSION_INPUT"

  # ═══════ REVERT (รันเฉพาะเมื่อพัง / skip เมื่อผ่าน — เรียง FE→BE · DB = migration fail เท่านั้น) ═══════
  revert-frontend:
    name: "R2 · revert frontend (image :prev)"
    needs: frontend
    if: ${{ always() && needs.frontend.result == 'failure' }}
    runs-on: ubuntu-latest
    steps:
      - uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PROD_SERVER }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_KEY }}
          script_stop: true
          script: cd /root/dormi-edge/deploy/dormi-full-update && bash 03-revert/revert2-deploy-frontend-old-version.sh

  # revert BE เมื่อ: BE เอง fail  หรือ  FE fail "ทั้งที่ BE ถูก deploy จริง" (คู่ coordinated ต้องถอยด้วยกัน)
  #   scope=frontend (BE skipped) + FE fail → ไม่ revert BE (BE ไม่ได้ถูกแตะเลย)
  revert-backend:
    name: "R1 · revert backend (image :prev)"
    needs: [backend, frontend, revert-frontend]
    if: >-
      ${{ always()
        && (needs.backend.result == 'failure'
            || (needs.frontend.result == 'failure' && needs.backend.result == 'success')) }}
    runs-on: ubuntu-latest
    steps:
      - uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PROD_SERVER }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_KEY }}
          script_stop: true
          script: cd /root/dormi-edge/deploy/dormi-full-update && bash 03-revert/revert1-deploy-backend-old-version.sh

  # ★ นโยบาย DB revert (ปิด H1 — หน้าต่างข้อมูลหาย):
  #   อัตโนมัติเฉพาะ "migration fail" — ตอนนั้นยังไม่มี traffic บน schema ใหม่ → restore ปลอดภัย
  #   backend/frontend fail = ผู้ใช้เขียนข้อมูลระหว่าง deploy ไปแล้ว → restore อัตโนมัติจะลบข้อมูลจริง
  #   → กรณีนั้นถ้าจำเป็น (migration เป็น destructive) ให้คนสั่งเองผ่าน workflow "Revert DB (manual)"
  revert-db:
    name: "R0 · revert database (migration fail เท่านั้น)"
    needs: migration
    if: ${{ always() && needs.migration.result == 'failure' }}
    runs-on: ubuntu-latest
    steps:
      - uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PROD_SERVER }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_KEY }}
          script_stop: true
          # revert0 เช็ค marker เอง — ไม่มี migration รอบนี้ = ข้าม (ไม่แตะ DB)
          script: cd /root/dormi-edge/deploy/dormi-full-update && bash 03-revert/revert0-restore-db.sh
